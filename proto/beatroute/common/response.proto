syntax = "proto3";

package beatroute.common;

import "google/protobuf/any.proto";

message Response {
    bool success = 1;
    int32 status = 2;
    string message = 3;
    optional google.protobuf.Any data = 4;
    optional google.protobuf.Any data_error = 5;
    optional Pagination pagination = 6;
}

message Pagination {
    int32 currentPage = 1;
    int32 totalCount = 2;
    int32 perPage = 3;
    int32 pageCount = 4;
}